apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: autotest

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - redis.yaml
  - api.yaml
  - worker.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: autotest
  app.kubernetes.io/managed-by: kustomize

images:
  - name: autotest-api
    newTag: latest
