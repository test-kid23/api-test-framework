apiVersion: apps/v1
kind: Deployment
metadata:
  name: autotest-api
  namespace: autotest
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: autotest-api
  template:
    metadata:
      labels:
        app: autotest-api
    spec:
      # Wait for PostgreSQL & Redis to be ready before starting
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z autotest-postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z autotest-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
        - name: alembic-migrate
          image: autotest-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: autotest-config
            - secretRef:
                name: autotest-secret
      containers:
        - name: api
          image: autotest-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: autotest-config
            - secretRef:
                name: autotest-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: app-config
              mountPath: /app/config
              readOnly: true
            - name: testcases
              mountPath: /app/testcases
              readOnly: true
            - name: reports
              mountPath: /app/reports
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: autotest-app-yaml
        - name: testcases
          emptyDir: {}
        - name: reports
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: autotest-api
  namespace: autotest
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: autotest-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autotest-api-hpa
  namespace: autotest
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autotest-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
