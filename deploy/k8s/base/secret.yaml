apiVersion: v1
kind: Secret
metadata:
  name: autotest-secret
  namespace: autotest
  labels:
    app.kubernetes.io/name: autotest-platform
type: Opaque
stringData:
  # --- PostgreSQL credentials ---
  PGPASSWORD: "autotest"
  POSTGRES_PASSWORD: "autotest"

  # --- Database DSN (assembled) ---
  AUTOTEST_DB_URL: "postgresql+asyncpg://autotest:autotest@autotest-postgres:5432/autotest"

  # --- JWT / Auth ---
  AUTH_JWT_SECRET: "change-me-in-production-use-a-strong-random-key"
  AUTH_DEFAULT_ADMIN_PASSWORD: "admin123"

  # --- API Key (internal) ---
  API_KEY: "autotest-k8s-internal-key-change-me"
