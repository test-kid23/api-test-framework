apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: autotest

resources:
  - ../../base

# Production-specific patches
patches:
  - target:
      kind: Deployment
      name: autotest-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi

  - target:
      kind: Deployment
      name: autotest-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 4
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi

  - target:
      kind: HorizontalPodAutoscaler
      name: autotest-api-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20

  - target:
      kind: HorizontalPodAutoscaler
      name: autotest-worker-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 4
      - op: replace
        path: /spec/maxReplicas
        value: 50

  - target:
      kind: PersistentVolumeClaim
      name: postgres-pvc
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 50Gi

configMapGenerator:
  - name: autotest-config
    behavior: merge
    literals:
      - ENV=production
      - UVICORN_LOG_LEVEL=warning
      - CELERY_LOG_LEVEL=warning
      - WORKER_CONCURRENCY=8

images:
  - name: autotest-api
    newTag: stable
