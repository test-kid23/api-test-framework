{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autotest-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: autotest-worker
  template:
    metadata:
      labels:
        app: autotest-worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "autotest-platform.postgresHost" . }} 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "autotest-platform.redisHost" . }} 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
      containers:
        - name: worker
          image: {{ .Values.global.imageRegistry }}/{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - celery
            - -A
            - worker.celery_app
            - worker
            - --loglevel=${CELERY_LOG_LEVEL:-{{ .Values.worker.logLevel }}}
            - --concurrency=${WORKER_CONCURRENCY:-{{ .Values.worker.concurrency }}}
            - --pool=prefork
            - --max-tasks-per-child={{ .Values.worker.maxTasksPerChild }}
            - --time-limit={{ .Values.worker.timeLimit }}
          envFrom:
            - configMapRef:
                name: autotest-config
            - secretRef:
                name: autotest-secret
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - worker.celery_app
                - inspect
                - ping
                - -d
                - celery@$(hostname)
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: app-config
              mountPath: /app/config
              readOnly: true
            - name: testcases
              mountPath: /app/testcases
              readOnly: true
            - name: reports
              mountPath: /app/reports
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: autotest-app-yaml
        - name: testcases
          emptyDir: {}
        - name: reports
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
{{- if .Values.worker.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autotest-worker-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autotest-worker
  minReplicas: {{ .Values.worker.hpa.minReplicas }}
  maxReplicas: {{ .Values.worker.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.hpa.targetCPUUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.hpa.targetMemoryUtilization }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
{{- end }}
{{- end }}
