{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autotest-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: autotest-api
  template:
    metadata:
      labels:
        app: autotest-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "autotest-platform.postgresHost" . }} 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "autotest-platform.redisHost" . }} 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
        - name: alembic-migrate
          image: {{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: autotest-config
            - secretRef:
                name: autotest-secret
      containers:
        - name: api
          image: {{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - uvicorn
            - api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.api.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: autotest-config
            - secretRef:
                name: autotest-secret
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: app-config
              mountPath: /app/config
              readOnly: true
            - name: testcases
              mountPath: /app/testcases
              readOnly: true
            - name: reports
              mountPath: /app/reports
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: autotest-app-yaml
        - name: testcases
          emptyDir: {}
        - name: reports
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: autotest-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: autotest-api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
---
{{- if .Values.api.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autotest-api-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: autotest-platform
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autotest-api
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetCPUUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetMemoryUtilization }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
{{- end }}
{{- end }}
