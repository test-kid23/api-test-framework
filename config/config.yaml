# ============================================================
# 全局配置
# ============================================================
project:
  name: "API 自动化测试套件"
  version: "1.0.0"

# ----------------------------------------------------------
# 配置系统设置
# ----------------------------------------------------------
settings:
  # list 字段合并策略: "replace"（直接替换，默认）| "append"（增量追加）
  merge_strategy: replace
  # 配置文件热加载
  hot_reload:
    enabled: false         # 是否启用热加载（需安装 watchdog）

# ----------------------------------------------------------
# HTTP 请求配置（对应 HttpConfig Schema）
# ----------------------------------------------------------
http:
  timeout: 30             # 请求超时（秒），范围 1-300
  verify_ssl: false        # 是否验证 SSL 证书
  max_retries: 3           # 最大重试次数，范围 0-10
  retry_delay: 1
  retry_on: [502, 503, 504]
  pool_connections: 10
  pool_maxsize: 10
  follow_redirects: true
  default_headers:
    Accept: application/json
    User-Agent: AutoTest/1.0

# ----------------------------------------------------------
# 日志配置（对应 LoggingConfig Schema）
# 基于 structlog 结构化日志，支持控制台彩色 / JSON 双输出
# ----------------------------------------------------------
logging:
  level: INFO                          # 日志级别: DEBUG|INFO|WARNING|ERROR
  format: console                      # 控制台输出格式: console(彩色)|json(JSON行)
                                       # 注：文件日志始终为 JSON，不受此字段影响
  console:
    enabled: true
    colorize: true
  file:
    enabled: true
    path: logs/test.log
    max_bytes: 10485760  # 10MB
    backup_count: 5
  request_log:
    enabled: true
    path: logs/requests.log
    max_bytes: 10485760
    backup_count: 5
  # 敏感数据脱敏
  sensitive_fields: []  # 用户自定义额外脱敏字段，如 ["x-api-key", "private_token"]
  mask_enabled: true     # 是否启用脱敏

# ----------------------------------------------------------
# 报告配置（对应 ReportConfig Schema）
# ----------------------------------------------------------
report:
  adapter: allure                       # 报告适配器: allure|html
  output_dir: reports                   # 报告输出目录
  allure:
    enabled: true
    results_dir: reports/allure-results
  html:
    enabled: false

# ----------------------------------------------------------
# 断言配置
# ----------------------------------------------------------
assertion:
  fail_fast: false
  default_response_time: 5000  # ms
  save_response_on_failure: true

# ----------------------------------------------------------
# Fixture 安全配置
# ----------------------------------------------------------
fixtures:
  allowed_shell_commands: []      # Shell 命令白名单，空列表禁止所有 shell 命令
  shell_sandbox: false            # 是否启用沙箱限制（敏感路径检查等）

# ----------------------------------------------------------
# Mock 服务配置
# ----------------------------------------------------------
mock:
  enabled: true                   # 是否启用 Mock 服务（嵌入在 API 进程中）
  prefix: "/_mock"                # Mock 服务路径前缀

# ----------------------------------------------------------
# 流量录制与回放配置
# ----------------------------------------------------------
recorder:
  enabled: true                   # 是否启用流量录制功能
  save_dir: "recordings"          # 录制文件保存目录
  auto_record: false              # 是否自动录制（所有 HTTP 请求自动记录）
  max_entries_per_session: 1000   # 单次会话最大录制条目数
  replay:
    timeout: 30                   # 回放单次请求超时（秒）
    compare_headers: []           # 回放时需对比的响应头（空=对比全部，排除 ignore_headers）
    ignore_headers: []            # 回放时忽略的响应头（空=使用默认列表）
    ignore_body_keys: []          # 回放时忽略的响应体字段
    strict_mode: false            # 严格模式（逐字段精确匹配）

# ----------------------------------------------------------
# 执行配置（对应 ExecutionConfig Schema）
# ----------------------------------------------------------
execution:
  mode: local                          # 执行模式: local|distributed
  parallel_workers: 4                  # 并行工作线程数，范围 1-16
  parallel: false
  workers: 4
  rerun_failed: 0
  rerun_delay: 1
  celery:
    broker_url: redis://localhost:6379/0
    result_backend: redis://localhost:6379/0
    task_serializer: json
    result_serializer: json
    task_track_started: true
    worker_concurrency: 4

# ----------------------------------------------------------
# 用例超时控制（全局默认，单用例可通过 TestCase.timeout 覆盖）
# ----------------------------------------------------------
case_timeout: 300                      # 默认用例超时时间（秒），范围 1-3600

# ----------------------------------------------------------
# 持久化配置（对应 PersistenceConfig Schema）
# ----------------------------------------------------------
persistence:
  enabled: true                         # 是否启用测试结果自动持久化到数据库（默认开启，本地调试可关闭）

# ----------------------------------------------------------
# 通知配置（对应通知服务）
# ----------------------------------------------------------
notifications:
  enabled: false                        # 是否启用通知服务
  rule: on_failure                      # 通知规则: always(始终) | on_failure(仅失败) | failure_rate(失败率阈值)
  failure_threshold: 0.0                # 失败率阈值 0.0~1.0（仅 rule=failure_rate 时生效）
  report_url: ""                        # 报告链接 URL，将嵌入通知消息中
  channels:
    wecom:                              # 企业微信群机器人
      enabled: false
      webhook_url: ""                   # https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxxx
    dingtalk:                           # 钉钉群机器人
      enabled: false
      webhook_url: ""                   # https://oapi.dingtalk.com/robot/send?access_token=xxxxx
      secret: ""                        # 加签密钥（SEC 开头，可选）
    email:                              # 邮件通知（骨架）
      enabled: false
      smtp_host: ""
      smtp_port: 587
      username: ""
      password: ""
      from_addr: ""
      to_addrs: []
      use_tls: true

# ----------------------------------------------------------
# 插件配置（对应 PluginConfig Schema）
# ----------------------------------------------------------
plugins:
  mode: all                              # 插件加载模式: all（全部加载）| whitelist（白名单）| blacklist（黑名单）
  enabled: []                            # 白名单：仅加载此列表中的插件（mode=whitelist 时生效）
  disabled: []                           # 黑名单：排除此列表中的插件（mode=blacklist 时生效）

# ----------------------------------------------------------
# 数据库配置（对应 DBConfig Schema）
# ----------------------------------------------------------
db:
  driver: sqlite                       # 数据库驱动: sqlite|mysql|postgresql
  dsn: ""                              # 数据源连接字符串

# ----------------------------------------------------------
# 业务数据源配置（对应 DataSourcesConfig Schema）
# 用于 DBAction / DBAssertItem 中的数据库操作和断言
# ----------------------------------------------------------
datasources:
  default: main_db                     # 默认数据源名称
  main_db:
    type: mysql                        # 数据库类型: mysql|postgresql|sqlite
    host: localhost
    port: 3306
    user: root
    password: ""
    database: test
    pool_size: 5
    max_overflow: 10
    pool_recycle: 3600
    echo: false

# ----------------------------------------------------------
# 认证配置（JWT + RBAC）
# ----------------------------------------------------------
auth:
  jwt_secret: "autotest-secret-key-change-in-production"  # JWT 签名密钥（生产环境请通过环境变量 AUTOTEST_JWT_SECRET 覆盖）
  token_expire_minutes: 480                                # Token 过期时间（分钟），默认 8 小时
  default_admin:
    username: "admin"                                      # 首次启动时自动创建的默认管理员用户名
    password: "admin123"                                   # 默认管理员密码（首次登录后请立即修改）
    project: "default"                                     # 默认项目名称
