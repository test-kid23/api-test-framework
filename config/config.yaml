# ============================================================
# 全局配置
# ============================================================
project:
  name: "API 自动化测试套件"
  version: "1.0.0"

# ----------------------------------------------------------
# HTTP 请求配置（对应 HttpConfig Schema）
# ----------------------------------------------------------
http:
  timeout: 30             # 请求超时（秒），范围 1-300
  verify_ssl: false        # 是否验证 SSL 证书
  max_retries: 3           # 最大重试次数，范围 0-10
  retry_delay: 1
  retry_on: [502, 503, 504]
  pool_connections: 10
  pool_maxsize: 10
  follow_redirects: true
  default_headers:
    Accept: application/json
    User-Agent: AutoTest/1.0

# ----------------------------------------------------------
# 日志配置（对应 LoggingConfig Schema）
# ----------------------------------------------------------
logging:
  level: INFO                          # 日志级别: DEBUG|INFO|WARNING|ERROR
  format: console                      # 输出格式: console|json
  console:
    enabled: true
    colorize: true
  file:
    enabled: true
    path: logs/test.log
    max_bytes: 10485760  # 10MB
    backup_count: 5
  request_log:
    enabled: true
    path: logs/requests.log
    max_bytes: 10485760
    backup_count: 5
  # 敏感数据脱敏
  sensitive_fields: []  # 用户自定义额外脱敏字段，如 ["x-api-key", "private_token"]
  mask_enabled: true     # 是否启用脱敏

# ----------------------------------------------------------
# 报告配置（对应 ReportConfig Schema）
# ----------------------------------------------------------
report:
  adapter: allure                       # 报告适配器: allure|html
  output_dir: reports                   # 报告输出目录
  allure:
    enabled: true
    results_dir: reports/allure-results
  html:
    enabled: false

# ----------------------------------------------------------
# 断言配置
# ----------------------------------------------------------
assertion:
  fail_fast: false
  default_response_time: 5000  # ms
  save_response_on_failure: true

# ----------------------------------------------------------
# Fixture 安全配置
# ----------------------------------------------------------
fixtures:
  allowed_shell_commands: []      # Shell 命令白名单，空列表禁止所有 shell 命令
  shell_sandbox: false            # 是否启用沙箱限制（敏感路径检查等）

# ----------------------------------------------------------
# 执行配置（对应 ExecutionConfig Schema）
# ----------------------------------------------------------
execution:
  mode: local                          # 执行模式: local|distributed
  parallel_workers: 4                  # 并行工作线程数，范围 1-16
  parallel: false
  workers: 4
  rerun_failed: 0
  rerun_delay: 1

# ----------------------------------------------------------
# 数据库配置（对应 DBConfig Schema）
# ----------------------------------------------------------
db:
  driver: sqlite                       # 数据库驱动: sqlite|mysql|postgresql
  dsn: ""                              # 数据源连接字符串
