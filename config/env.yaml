# ============================================================
# 多环境配置
# ============================================================
default: dev

environments:
  # ----------------------------------------------------------
  # 开发环境
  # ----------------------------------------------------------
  dev:
    base_url: https://httpbin.org
    ws_url: ws://localhost:8080/ws
    variables:
      admin_user: dev_admin
      admin_pass: dev123
    http:
      timeout: 30
      verify_ssl: false
    db:
      driver: mysql                        # DBConfig: sqlite|mysql|postgresql
      dsn: "mysql://root@localhost:3306/test_db"
    datasources:
      default: main_db
      main_db:
        type: mysql
        host: localhost
        port: 3306
        user: root
        password: "${DB_PASSWORD}"
        database: test_db
        pool_size: 5

  # ----------------------------------------------------------
  # 预发布环境
  # ----------------------------------------------------------
  staging:
    base_url: https://staging-api.example.com
    ws_url: ws://staging-api.example.com/ws
    variables:
      admin_user: staging_admin
      admin_pass: staging_pass
    http:
      timeout: 15
      verify_ssl: true

  # ----------------------------------------------------------
  # 生产环境
  # ----------------------------------------------------------
  production:
    base_url: https://api.example.com
    ws_url: wss://api.example.com/ws
    variables: {}
    http:
      timeout: 10
      verify_ssl: true

  # ----------------------------------------------------------
  # 本地环境（用于本地开发调试）
  # ----------------------------------------------------------
  local:
    base_url: http://127.0.0.1:8011
    ws_url: ws://127.0.0.1:8011/ws
    variables:
      admin_user: admin
      admin_pass: "123456"
    http:
      timeout: 10
      verify_ssl: false
