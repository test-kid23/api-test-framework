name: API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点
  workflow_dispatch:
    inputs:
      environment:
        description: '测试环境'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, production]
      tags:
        description: '用例标签'
        required: false
        default: 'smoke'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh-pages 部署需要写权限
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/coverage

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
                 --cov=framework \
                 --cov-report=term \
                 --cov-report=html:reports/coverage \
                 --cov-fail-under=0 \
                 --ignore=tests/framework/test_sync.py \
                 --ignore=tests/framework/test_ws_async_executor.py \
                 --alluredir=reports/allure-results \
                 --no-persist \
                 --tb=short \
                 -v

      # ── Allure Report (same job, no cross-job artifact dependency) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          mkdir -p allure-history
          if [ "$(ls -A reports/allure-results 2>/dev/null)" ]; then
            allure generate reports/allure-results --clean -o allure-history
            echo "Allure report generated to allure-history/"
          else
            echo "No allure results found, skipping report generation"
            mkdir -p allure-history
            echo "<html><body><h1>No test results available</h1></body></html>" > allure-history/index.html
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          keep_files: false

  # ──────────────────────────────────────────────
  # Security Scan（在测试完成后执行）
  # ──────────────────────────────────────────────
  security-scan:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    env:
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install safety bandit

      - name: Safety — 扫描依赖已知漏洞（API key）
        if: env.SAFETY_API_KEY != ''
        uses: pyupio/safety-action@v1
        with:
          api_key: ${{ secrets.SAFETY_API_KEY }}
        continue-on-error: true

      - name: Safety — 扫描依赖已知漏洞（无 API key）
        if: env.SAFETY_API_KEY == ''
        run: |
          safety check --full-report || echo "⚠️  Safety found vulnerabilities (exit code $?)"
        continue-on-error: true

      - name: Bandit — 安全代码扫描
        run: |
          bandit -r framework/ -c .bandit --exit-zero
        continue-on-error: true
