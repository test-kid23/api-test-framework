name: API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点
  workflow_dispatch:
    inputs:
      environment:
        description: '测试环境'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, production]
      tags:
        description: '用例标签'
        required: false
        default: 'smoke'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/coverage

      - name: Run unit tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ \
                 --cov=framework \
                 --cov-report=term \
                 --cov-report=html:reports/coverage \
                 --cov-fail-under=0 \
                 -v

      - name: Run tests
        env:
          ENV: ${{ github.event.inputs.environment || 'staging' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          pytest testcases/ --env=${{ env.ENV }} \
                 -m "${{ github.event.inputs.tags || 'smoke' }}" \
                 -n auto \
                 --alluredir=reports/allure-results \
                 -v

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-py${{ matrix.python-version }}
          path: reports/allure-results/

  # ──────────────────────────────────────────────
  # Deploy Allure Report（测试矩阵全部完成后执行）
  # ──────────────────────────────────────────────
  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure Results (Python 3.11)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-py3.11
          path: reports/allure-results-py311

      - name: Download Allure Results (Python 3.12)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-py3.12
          path: reports/allure-results-py312

      - name: Merge Allure Results
        run: |
          mkdir -p merged-allure-results
          if [ -d "reports/allure-results-py311" ] && [ "$(ls -A reports/allure-results-py311 2>/dev/null)" ]; then
            cp reports/allure-results-py311/* merged-allure-results/ 2>/dev/null || true
          fi
          if [ -d "reports/allure-results-py312" ] && [ "$(ls -A reports/allure-results-py312 2>/dev/null)" ]; then
            cp reports/allure-results-py312/* merged-allure-results/ 2>/dev/null || true
          fi
          echo "Merged $(ls -1 merged-allure-results/ 2>/dev/null | wc -l) result files"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          mkdir -p allure-history
          allure generate merged-allure-results --clean -o allure-history
          echo "Allure report generated to allure-history/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          keep_files: false

  # ──────────────────────────────────────────────
  # Security Scan（在测试矩阵全部完成后执行）
  # ──────────────────────────────────────────────
  security-scan:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    env:
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install safety bandit

      - name: Safety — 扫描依赖已知漏洞（API key）
        if: env.SAFETY_API_KEY != ''
        uses: pyupio/safety-action@v1
        with:
          api_key: ${{ secrets.SAFETY_API_KEY }}
        continue-on-error: true

      - name: Safety — 扫描依赖已知漏洞（无 API key）
        if: env.SAFETY_API_KEY == ''
        run: safety check --full-report
        continue-on-error: true

      - name: Bandit — 安全代码扫描
        run: |
          bandit -r framework/ -c .bandit --exit-zero
        continue-on-error: true
